<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="pl">
<head>
    <title>Statystyki - PLAYMC.PL</title>
    <style type="text/css">
        body {
            background-color: #0f0f0f;
            color: #00ff00;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .container {
            border: 1px solid #00ff00;
            padding: 30px;
            background: #1a1a1a;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            text-align: center;
        }
        .status-online { color: #55ff55; font-weight: bold; }
        .status-offline { color: #ff5555; font-weight: bold; }
        
        .btn-back {
            margin-top: 25px;
            display: inline-block;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-decoration: none;
            padding: 10px 25px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: #00ff00;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SYSTEM STATUS</h2>
    <hr style="border-color: #00ff00;"/>
    <p>IP: playmcminecraft.falix.gg</p>
    <p>STATUS: <span id="st" class="status-offline">ŁADOWANIE...</span></p>
    <p>GRACZE: <span id="pl">? / ?</span></p>

    <a href="index.html" class="btn-back">« WRÓĆ DO SKLEPU</a>
</div>

<script type="text/javascript">
// <![CDATA[
    async function update() {
        try {
            const r = await fetch('https://api.mcstatus.io/v2/status/java/playmcminecraft.falix.gg');
            const d = await r.json();
            const s = document.getElementById('st');
            const p = document.getElementById('pl');

            if (d.online) {
                s.innerText = "ONLINE";
                s.className = "status-online";
                p.innerText = d.players.online + " / " + d.players.max;
            } else {
                s.innerText = "OFFLINE";
                s.className = "status-offline";
            }
        } catch (e) { console.log(e); }
    }
    update();
// ]]>
</script>

</body>
</html>
